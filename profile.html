<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-Commerce Boilerplate</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="profile.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">My<span>Store</span></a>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="products.html"><i class="fa-solid fa-bag-shopping"></i> Products</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
                <li><a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="min-height: 70vh; padding: 40px 0;">

        <div style="text-align: center; margin-top: 80px;">

            <h1 
                style="font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 3rem; margin-bottom: 20px;">
                Hi, Register now!
            </h1>

            <div id="registerForm">
                <div class="input-control">
                    <label>Name</label>
                    <input id="username" type="text">
                </div>

                <div class="input-control">
                    <label>Email</label>
                    <input id="registerEmail" type="email">
                </div>

                <div class="input-control">
                    <label>Password</label>
                    <input id="registerPassword" type="password">
                </div>

                <button class="btn-gold" onclick="register()">Register</button>
                <p>
                    Already have an account?
                    <button type="button" class="btn-gold" onclick="showLogin()">Login Instead</button>
                </p>
            </div>

            <div id="loginForm" style="display:none;">
                <div class="input-control">
                    <label>Email</label>
                    <input id="loginEmail" type="email">
                </div>

                <div class="input-control">
                    <label>Password</label>
                    <input id="loginPassword" type="password">
                </div>

                <button class="btn-gold" onclick="login()">Login</button>
                <p>
                    Do not have an account yet?
                    <button type="button" class="btn-gold" onclick="showRegister()">Register Now</button>
                </p>

            </div>

            <div id="profileSection" style="display:none;">
                <h2>Welcome!!</h2>
                <p><strong>Name:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <button class="btn-gold" onclick="logout()">Logout</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 E-Commerce Team Project. </p>
        </div>
    </footer>

    <script src="profile.js"></script>

</body>
</html>
